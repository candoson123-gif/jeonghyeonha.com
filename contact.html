<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — Ha Jeonghyeon</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body data-page="contact">

<header id="site-header"></header>

<main class="page-wrap">
  <div class="contact-wrap">
    <div class="contact-email" id="contact-email"></div>
    <div class="contact-social" id="contact-social"></div>

    <!-- ★ action의 YOUR_FORM_ID를 Formspree(formspree.io) 등에서 발급받은 값으로 바꿔야
         실제로 메일이 전송됩니다. 정적 사이트는 폼 전송을 자체 처리할 서버가 없어서
         Formspree/Getform 같은 무료 폼 백엔드 서비스 연결이 필요합니다. -->
    <form class="contact-form" action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
      <label for="name"><span class="ko">이름</span><span class="en">Name</span></label>
      <input type="text" id="name" name="name" required>

      <label for="email"><span class="ko">이메일</span><span class="en">Email</span></label>
      <input type="email" id="email" name="email" required>

      <label for="message"><span class="ko">메시지</span><span class="en">Message</span></label>
      <textarea id="message" name="message" rows="5" required></textarea>

      <button type="submit"><span class="ko">보내기</span><span class="en">Send</span></button>
      <p class="form-note">
        <span class="ko">※ 폼이 동작하려면 Formspree 등에서 발급받은 주소를 위 action에 연결해야 합니다.</span>
        <span class="en">※ Connect a Formspree (or similar) endpoint above for this form to actually send email.</span>
      </p>
    </form>
  </div>
</main>

<footer id="site-footer"></footer>

<script src="js/works-data.js"></script>
<script src="js/common.js"></script>
<script src="js/lang.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("contact-email").innerHTML =
      `<a href="mailto:${SITE.email}">${SITE.email}</a>`;
    const socialLinks = [
      SITE.instagram ? `<a href="${SITE.instagram}" target="_blank" rel="noopener">Instagram</a>` : "",
      SITE.vimeo ? `<a href="${SITE.vimeo}" target="_blank" rel="noopener">Vimeo</a>` : "",
    ].filter(Boolean).join(" &nbsp; ");
    document.getElementById("contact-social").innerHTML = socialLinks;
  });
</script>
</body>
</html>
